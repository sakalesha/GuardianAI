services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3001:3001"
  ml:
    build:
      context: .
      dockerfile: docker/ml.Dockerfile
    ports:
      - "5000:5000"
